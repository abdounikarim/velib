# Production environment override.
# Usage: docker compose -f compose.yaml -f compose.prod.yaml up -d
services:
  app:
    build:
      target: prod
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    environment:
      - NODE_ENV=production
